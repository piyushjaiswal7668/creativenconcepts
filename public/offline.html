<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Connection – C&C Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2ff;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 36px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(108,99,255,.12);
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { color: #6C63FF; font-size: 1.5rem; margin-bottom: 12px; }
        p  { color: #666; line-height: 1.6; margin-bottom: 28px; }
        button {
            background: #6C63FF; color: #fff;
            border: none; border-radius: 12px;
            padding: 14px 32px; font-size: 1rem;
            cursor: pointer; transition: opacity .2s;
        }
        button:hover { opacity: .85; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>You're offline</h1>
        <p>Check your internet connection and try again. Your messages will send as soon as you're back online.</p>
        <button onclick="window.location.reload()">Try again</button>
    </div>
</body>
</html>
